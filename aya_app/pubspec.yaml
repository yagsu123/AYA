name: aya_app
description: Aradhana Youth Association (AYA) mobile app — Phase 1
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_platform_widgets: ^7.0.0
  flutter_secure_storage: ^9.0.0
  dio: ^5.0.0
  flutter_dotenv: ^5.0.0
  google_fonts: ^6.0.0
  lottie: ^3.0.0
  flutter_riverpod: ^2.0.0
  go_router: ^13.0.0
  cached_network_image: ^3.0.0
  image_picker: ^1.0.0
  url_launcher: ^6.2.0
  share_plus: ^7.2.0
  path_provider: ^2.1.0
  add_2_calendar: ^3.0.1
  wakelock_plus: ^1.2.1
  audioplayers: ^6.1.0
  package_info_plus: ^9.0.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/lottie/
    - assets/images/
    - assets/audio/
